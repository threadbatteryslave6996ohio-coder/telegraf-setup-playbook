# Arch Linux-specific variables. Loaded after vars/common.yml, so values here
# override the shared defaults.

# Packages installed by the site playbook (pacman).
arch_required_packages:
  - ca-certificates
  - curl
  - gnupg
  - audit
  - osquery
  - tailscale
  - prometheus-node-exporter
  - fluent-bit
  - docker

# Supplementary groups for the admin user. Arch uses `wheel` for sudo.
ansible_admin_groups:
  - wheel

# Public SSH key installed on the admin account by the bootstrap playbook.
# Paste the key string here (e.g. "ssh-ed25519 AAAA... you@host").
ansible_admin_authorized_key: ""

# External Loki endpoint host logs are forwarded to.
loki_host: ""
loki_port: 3100
loki_uri: /loki/api/v1/push

# External Splunk HEC endpoint security events are forwarded to.
splunk_hec_host: ""
splunk_hec_port: 8088
splunk_hec_token: ""
splunk_hec_index: security
splunk_hec_sourcetype: vm_security
splunk_hec_tls: true
