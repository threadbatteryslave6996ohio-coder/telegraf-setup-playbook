# Single inventory for every playbook. Each playbook picks its own group:
#   bootstrap/arch + site/arch  -> [arch_hosts]
#   bootstrap/ubuntu + site/ubuntu -> [ubuntu_hosts]
#
# ansible_user is the steady-state `ansible` account used by the site stage.
# The bootstrap stage runs once as an EXISTING admin instead — override on the
# command line, e.g.  -u azureuser  (Ubuntu)  or  -u your-existing-admin (Arch).

[arch_hosts]
server1 ansible_host=13.86.115.104

[arch_hosts:vars]
ansible_user=ansible

[ubuntu_hosts]
archlinux-control-plane ansible_host=13.86.115.104 ansible_ssh_private_key_file=/home/kamina_goat/.ssh/clippy_azure

[ubuntu_hosts:vars]
ansible_user=ansible
