[defaults]
# One inventory directory per environment, each carrying its own
# group_vars/all/. Staging is the default on purpose: a forgotten -i then hits
# staging rather than production. Select another with, e.g.
#   ansible-playbook -i inventories/prod site/control/site-control.yml
inventory = inventories/stg
interpreter_python = auto_silent
stdout_callback = default
result_format = yaml
bin_ansible_callbacks = True

[privilege_escalation]
become = True
become_method = sudo
become_ask_pass = False
