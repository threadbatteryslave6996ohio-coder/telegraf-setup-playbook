---
- name: Install Tailscale, Prometheus node exporter, and Fluent Bit on Arch Linux
  hosts: arch_hosts
  remote_user: ansible
  become: true

  pre_tasks:
    - name: Fail on unsupported distribution
      ansible.builtin.assert:
        that:
          - ansible_distribution | lower == "archlinux"
        fail_msg: "This playbook currently supports Arch Linux hosts only."

    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Compute missing packages
      ansible.builtin.set_fact:
        arch_missing_packages: "{{ arch_required_packages | difference(ansible_facts.packages.keys() | list) }}"
        arch_missing_aur_packages: "{{ arch_aur_packages | default([]) | difference(ansible_facts.packages.keys() | list) }}"

    - name: Fail when Loki connection variables are missing
      ansible.builtin.assert:
        that:
          - loki_host | length > 0
          - loki_port | int > 0
          - loki_uri | length > 0
          - fluent_bit_tail_paths | length > 0
          - fluent_bit_security_tail_paths | length > 0
          - audit_rules | length > 0
        fail_msg: "Set loki_host, loki_port, loki_uri, fluent_bit_tail_paths, fluent_bit_security_tail_paths, and audit_rules before running."

    - name: Fail when Splunk HEC variables are missing
      ansible.builtin.assert:
        that:
          - splunk_hec_host | length > 0
          - splunk_hec_port | int > 0
          - splunk_hec_token | length > 0
          - splunk_hec_index | length > 0
          - splunk_hec_sourcetype | length > 0
        fail_msg: "Set splunk_hec_host, splunk_hec_port, splunk_hec_token, splunk_hec_index, and splunk_hec_sourcetype before running."

  tasks:
    # A full -Syu is slow, so it runs at most once a day: the marker file holds
    # the date of the last upgrade and the play skips it when that is today.
    - name: Read the last system-upgrade marker
      ansible.builtin.slurp:
        src: "{{ arch_update_marker }}"
      register: arch_update_marker_file
      failed_when: false

    - name: Decide whether the system was already upgraded today
      ansible.builtin.set_fact:
        arch_upgraded_today: >-
          {{ (arch_update_marker_file.content | default('') | b64decode | trim)
             == ansible_date_time.date }}

    - name: Refresh the package database and upgrade the system
      community.general.pacman:
        update_cache: true
        upgrade: true
      register: arch_system_upgrade
      when: not arch_upgraded_today

    - name: Record today's date in the upgrade marker
      ansible.builtin.copy:
        dest: "{{ arch_update_marker }}"
        content: "{{ ansible_date_time.date }}\n"
        owner: root
        group: root
        mode: "0644"
      when: not arch_upgraded_today

    - name: Install base packages and services
      ansible.builtin.command:
        cmd: "pacman -S --noconfirm --needed {{ arch_missing_packages | join(' ') }}"
      changed_when: true
      when: arch_missing_packages | length > 0

    # Some agents (Fluent Bit) ship only in the AUR, which pacman cannot reach.
    # Build them from source as the unprivileged admin user: makepkg refuses to
    # run as root, and -si escalates on its own via that user's passwordless sudo.
    - name: Install build dependencies for AUR packages
      ansible.builtin.command:
        cmd: "pacman -S --noconfirm --needed base-devel git"
      changed_when: true
      when: arch_missing_aur_packages | length > 0

    - name: Create a build directory for AUR packages
      ansible.builtin.file:
        path: "{{ arch_aur_build_dir }}"
        state: directory
        owner: "{{ ansible_admin_user }}"
        group: "{{ ansible_admin_user }}"
        mode: "0755"
      when: arch_missing_aur_packages | length > 0

    - name: Clone AUR package repositories
      ansible.builtin.git:
        repo: "https://aur.archlinux.org/{{ item }}.git"
        dest: "{{ arch_aur_build_dir }}/{{ item }}"
        version: master
        update: true
      become_user: "{{ ansible_admin_user }}"
      loop: "{{ arch_missing_aur_packages }}"

    - name: Build and install AUR packages
      ansible.builtin.command:
        cmd: makepkg --syncdeps --install --noconfirm --needed
        chdir: "{{ arch_aur_build_dir }}/{{ item }}"
      become_user: "{{ ansible_admin_user }}"
      changed_when: true
      loop: "{{ arch_missing_aur_packages }}"

    # An upgrade can replace the kernel, which deletes the running kernel's
    # modules and leaves Docker unable to load nf_tables. post_reboot_delay
    # keeps Ansible from reconnecting mid-shutdown, which makes systemd reject
    # service starts as "destructive".
    - name: Reboot after a system upgrade
      ansible.builtin.reboot:
        msg: Rebooting after a system upgrade
        reboot_timeout: "{{ arch_reboot_timeout }}"
        post_reboot_delay: "{{ arch_reboot_settle_seconds }}"
      when:
        - arch_reboot_after_upgrade
        - arch_system_upgrade is changed

    - name: Enable and start tailscaled
      ansible.builtin.systemd:
        name: tailscaled
        enabled: true
        state: started

    - name: Join Tailnet when an auth key is provided
      ansible.builtin.command:
        cmd: >-
          tailscale up
          --authkey={{ tailscale_authkey }}
          --hostname={{ tailscale_hostname }}
      when: tailscale_authkey | length > 0
      no_log: true

    - name: Enable and start Prometheus node exporter
      ansible.builtin.systemd:
        name: prometheus-node-exporter
        enabled: true
        state: started

    - name: Install auditd security rules
      ansible.builtin.copy:
        dest: /etc/audit/rules.d/99-security.rules
        owner: root
        group: root
        mode: "0640"
        content: |
          {% for rule in audit_rules %}
          {{ rule }}
          {% endfor %}
      notify:
        - Load audit rules
        - Restart auditd

    - name: Enable and start auditd
      ansible.builtin.systemd:
        name: auditd
        enabled: true
        state: started

    - name: Enable and start osqueryd
      ansible.builtin.systemd:
        name: osqueryd
        enabled: true
        state: started

    - name: Configure Fluent Bit to forward logs to Loki
      ansible.builtin.copy:
        dest: /etc/fluent-bit/fluent-bit.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          [SERVICE]
              Flush        1
              Daemon       Off
              Log_Level    info

          {% for path in fluent_bit_tail_paths %}
          [INPUT]
              Name         tail
              Tag          host.logs
              Path         {{ path }}
              Mem_Buf_Limit 5MB
              Skip_Long_Lines On
              Refresh_Interval 5

          {% endfor %}
          [OUTPUT]
              Name         loki
              Match        host.*
              Host         {{ loki_host }}
              Port         {{ loki_port }}
              URI          {{ loki_uri }}
              Labels       job=fluent-bit,host={{ inventory_hostname }}
              line_format  json

          {% for path in fluent_bit_security_tail_paths %}
          [INPUT]
              Name         tail
              Tag          host.security
              Path         {{ path }}
              Mem_Buf_Limit 5MB
              Skip_Long_Lines On
              Refresh_Interval 5

          {% endfor %}

          [INPUT]
              Name         systemd
              Tag          host.security
              Systemd_Filter _SYSTEMD_UNIT=sshd.service
              Systemd_Filter _SYSTEMD_UNIT=systemd-logind.service
              Systemd_Filter _SYSTEMD_UNIT=polkit.service
              Systemd_Filter _SYSTEMD_UNIT=auditd.service
              Systemd_Filter _SYSTEMD_UNIT=osqueryd.service
              Read_From_Tail On
              Strip_Underscores On

          [OUTPUT]
              Name         splunk
              Match        host.security
              Host         {{ splunk_hec_host }}
              Port         {{ splunk_hec_port }}
              splunk_token {{ splunk_hec_token }}
              splunk_send_raw Off
              event_index  {{ splunk_hec_index }}
              event_sourcetype {{ splunk_hec_sourcetype }}
              event_host   {{ inventory_hostname }}
              tls          {{ 'on' if splunk_hec_tls else 'off' }}
          {%- if splunk_hec_tls %}
              tls.verify   {{ 'on' if splunk_hec_tls_verify | default(true) else 'off' }}
          {%- endif %}
      notify: Restart fluent-bit

    - name: Enable and start Fluent Bit
      ansible.builtin.systemd:
        name: fluent-bit
        enabled: true
        state: started

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

  handlers:
    # augenrules exits non-zero when a rule is already present in the kernel,
    # even though it changed nothing -- which is the normal case whenever
    # auditd loaded the same rules at startup. Treat that as success, but keep
    # failing on anything else.
    - name: Load audit rules
      ansible.builtin.command:
        cmd: augenrules --load
      register: augenrules_load
      changed_when: "'No change' not in augenrules_load.stdout"
      failed_when:
        - augenrules_load.rc != 0
        - "'Rule exists' not in augenrules_load.stderr"

    - name: Restart auditd
      ansible.builtin.systemd:
        name: auditd
        state: restarted

    - name: Restart fluent-bit
      ansible.builtin.systemd:
        name: fluent-bit
        state: restarted
