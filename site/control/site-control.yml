---
- name: Install and start the control-server stack on the control plane
  hosts: control_hosts
  remote_user: ansible
  become: true

  pre_tasks:
    - name: Fail on unsupported distribution
      ansible.builtin.assert:
        that:
          - ansible_distribution | lower == "archlinux"
        fail_msg: "This playbook currently supports Arch Linux hosts only."

    - name: Fail when the control repo variables are missing
      ansible.builtin.assert:
        that:
          - control_repo | length > 0
          - control_repo_dest | length > 0
          - control_repo_owner | length > 0
        fail_msg: "Set control_repo, control_repo_owner, and control_repo_dest before running."

    # Checked up front rather than at first use: the stack cannot start without
    # these, and failing before the clone is clearer than failing after it.
    - name: Fail when the stack's secrets are missing
      ansible.builtin.assert:
        that:
          - control_plane_host | length > 0
          - splunk_password | length >= 8
          - splunk_hec_token | length > 0
          - grafana_admin_password | length > 0
        fail_msg: >-
          Set control_plane_host in group_vars/all/common.yml, and splunk_password
          (8+ chars), splunk_hec_token and grafana_admin_password in
          group_vars/all/secrets.yml. Copy inventories/example/group_vars/all/secrets.yml to get started.

  tasks:
    - name: Install git, Docker, and the GitHub CLI
      community.general.pacman:
        name:
          - git
          - docker
          - docker-compose
          # Only used to clone a private repo; harmless otherwise.
          - github-cli
        state: present

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    # The stack runs as the checkout's owner rather than root, so that account
    # needs the docker group to reach the socket. The group only exists once
    # Docker is installed, which is why this is here and not in bootstrap. It
    # grants no new privilege: the admin user already has passwordless sudo.
    - name: Add the stack owner to the docker group
      ansible.builtin.user:
        name: "{{ control_repo_owner_user }}"
        groups: docker
        append: true

    # Group membership is established at login, so the existing SSH session
    # still lacks it until the connection is torn down and remade.
    - name: Reset the connection to pick up the new group membership
      ansible.builtin.meta: reset_connection

    # Shared with update-setup.yml, which refreshes the checkout on its own.
    - name: Update the deployment checkout
      ansible.builtin.include_tasks: tasks/update-repo.yml

    # .env is gitignored and never arrives with the clone, so it is rendered
    # here from group_vars/all/secrets.yml. The HEC token written here is the same one the
    # managed-node playbook hands Fluent Bit, which is what makes them agree.
    - name: Render the stack's .env
      ansible.builtin.template:
        src: control-server.env.j2
        dest: "{{ control_repo_dest }}/.env"
        owner: "{{ control_repo_owner_user }}"
        group: "{{ control_repo_owner_user }}"
        mode: "0600"
      no_log: true
      notify: Restart the control-server stack

    - name: Register managed hosts as Prometheus scrape targets
      ansible.builtin.template:
        src: managed-hosts.yml.j2
        dest: "{{ control_repo_dest }}/prometheus/targets/managed-hosts.yml"
        owner: "{{ control_repo_owner_user }}"
        group: "{{ control_repo_owner_user }}"
        mode: "0644"
      notify: Reload Prometheus

    # Runs after .env and the scrape targets are on disk: the stack must not
    # start before its configuration exists.
    - name: Start the stack and wait for it
      ansible.builtin.include_tasks: tasks/start-stack.yml

  handlers:
    - name: Shared control-plane handlers
      ansible.builtin.import_tasks: tasks/handlers.yml
