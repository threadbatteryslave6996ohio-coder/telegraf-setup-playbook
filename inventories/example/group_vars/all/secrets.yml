# Secrets shared by the managed-node and control-plane playbooks. Copy to
# vars/secrets.yml (gitignored) and fill in before running anything.
#
#   cp vars/secrets.yml.example vars/secrets.yml
#
# These live in one file rather than in each playbook's own vars because the
# same values are needed on both sides of the wire: the agents authenticate to
# Splunk HEC with the token Splunk itself is configured with, so a copy in two
# places is a copy that eventually disagrees and silently drops logs.

# Splunk admin password. Splunk refuses to start without it, minimum 8 chars.
splunk_password: ""

# Splunk HEC token. Any UUID; agents present it and Splunk accepts it.
# Generate one with:  python3 -c 'import uuid; print(uuid.uuid4())'
splunk_hec_token: ""

# Grafana admin login for the control plane's dashboards.
grafana_admin_user: admin
grafana_admin_password: ""

# Only needed to clone a private control-server deployment repo. A public repo
# clones without a token.
control_repo_gh_token: ""
