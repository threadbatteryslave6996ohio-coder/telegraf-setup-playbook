# Template for a new environment.
#
# Copy the whole tree to inventories/<env>/ and fill in real hosts and values:
#
#   cp -r inventories/example inventories/<env>
#   ansible-playbook -i inventories/<env> site/arch/site-arch.yml
#
# Each playbook picks its own group:
#   bootstrap/arch + site/arch          -> [arch_hosts]
#   bootstrap/ubuntu + site/ubuntu      -> [ubuntu_hosts]
#   site/control + site/control/update  -> [control_hosts]
#
# Environment-specific variables live alongside this file in group_vars/all/.
# Ansible picks them up automatically from the inventory directory, which is
# what keeps one environment's control plane, secrets and admin key from
# leaking into another's.
#
# ansible_user is the steady-state `ansible` account the site playbooks use.
# The bootstrap stage runs once as an EXISTING admin instead -- override it per
# run, e.g.  -e ansible_user=azureuser

[arch_hosts]
# my-host ansible_host=10.0.0.10 ansible_ssh_private_key_file=~/.ssh/ansible-<env>

[arch_hosts:vars]
ansible_user=ansible

# The control plane. Also a member of arch_hosts, so it runs the same agents as
# every other managed host in addition to hosting the stack.
[control_hosts]
# my-control ansible_host=10.0.0.11 ansible_ssh_private_key_file=~/.ssh/ansible-<env>

[control_hosts:vars]
ansible_user=ansible

[ubuntu_hosts]

[ubuntu_hosts:vars]
ansible_user=ansible
